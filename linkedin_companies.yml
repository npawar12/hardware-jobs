# LinkedIn-sourced hardware watchlist — the companies that don't expose a public
# ATS JSON API (custom/locked career sites + stealth startups). Consumed ONLY by
# scrape_linkedin.py. Each entry: display name + `aliases` = lowercased strings to
# match against LinkedIn's companyName field (a job is kept only if its company
# matches one of these AND the title passes hw_classify AND it's US/Canada).
# `aliases` under 4 chars are matched as whole words to avoid false hits.
#
# NOTE: companies with a working public ATS API live in hardware_companies.yml
# instead (free + precise). Removed from here on 2026-07-10 after ATS conversion:
# SiFive, Ambarella, Wolfspeed, Sony, Altera, KLA, SK hynix, Renesas (Workday/
# GH/SR) and Cerebras, OpenAI, d-Matrix (Ashby). Cirrus Logic stays here (its
# Lever board 404s); Ambiq stays here (analog-focused, out of digital-DV scope).
companies:
  # --- Group 2: big names on custom / locked career sites ---
  - name: AMD
    aliases: ["amd", "advanced micro devices"]
  - name: Apple
    aliases: ["apple"]
  - name: Google
    aliases: ["google", "alphabet"]
  - name: Microsoft
    aliases: ["microsoft"]
