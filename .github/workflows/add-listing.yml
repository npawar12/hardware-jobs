name: Add Job Listing

on:
  issues:
    types: [labeled]

jobs:
  add-listing:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write issue body to file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('issue_body.txt', context.payload.issue.body || '');

      - name: Add listing to README
        env:
          ISSUE_BODY_FILE: issue_body.txt
        run: python .github/scripts/add_listing.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md listings.json
          git diff --staged --quiet || git commit -m "add listing from issue #${{ github.event.issue.number }}" -m "Co-Authored-By: Aprameya Kannan <aprameyakannan@gmail.com>"
          git pull --rebase && git push

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Listing added to the repo! Thanks for contributing.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
