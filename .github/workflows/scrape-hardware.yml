name: Scrape Hardware Jobs (Personal)

on:
  schedule:
    - cron: '15 * * * *'   # hourly (ATS APIs are free); :15 to avoid the LinkedIn run
  workflow_dispatch:

concurrency:
  group: readme-updates
  cancel-in-progress: false

jobs:
  scrape-hardware:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GT_TOK }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Scrape hardware job boards
        run: python .github/scripts/scrape_hardware.py

      - name: Commit updated files
        env:
          GT_TOK: ${{ secrets.GT_TOK }}
        run: |
          git config user.name "Neeraj Pawar"
          git config user.email "npawar7739@gmail.com"
          git add README.md hardware_listings.json .github/data/seen_hardware.json
          git diff --staged --quiet || git commit -m "update hardware listings"
          git pull --rebase -X ours
          git push "https://x-access-token:${GT_TOK}@github.com/npawar12/hardware-jobs.git" HEAD:main
