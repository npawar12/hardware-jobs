name: Check Links

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: readme-updates
  cancel-in-progress: false

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GT_TOK }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check links
        run: python .github/scripts/check_links.py

      - name: Commit closed positions
        env:
          GT_TOK: ${{ secrets.GT_TOK }}
        run: |
          git config user.name "Neeraj Pawar"
          git config user.email "npawar7739@gmail.com"
          git add README.md LISTINGS.md
          git diff --staged --quiet || git commit -m "mark closed positions"
          git pull --rebase -X ours
          git push "https://x-access-token:${GT_TOK}@github.com/${{ github.repository }}.git" HEAD:main
